<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 · 黄金换算助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:   #F6F3EE;
      --ink:     #111010;
      --ink2:    #3A3835;
      --muted:   #9A9590;
      --dn:      #1B5E20;
      --bebas:   "Bebas Neue", "Arial Narrow", sans-serif;
      --serif:   "Crimson Pro", Georgia, serif;
      --sans:    "Noto Sans SC", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    .title {
      font-family: var(--bebas);
      font-size: 32px;
      letter-spacing: 0.08em;
      color: var(--dn);
      margin-bottom: 16px;
    }

    .msg {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--ink2);
      text-align: center;
      line-height: 1.7;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--muted);
      margin: 32px auto;
      opacity: 0.4;
    }

    .footer {
      font-family: var(--serif);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="icon">✅</div>
  <div class="title">支付成功</div>
  <div class="msg">您的会员已开通，<br>请返回工具页面使用。</div>
  <div class="divider"></div>
  <div class="footer">黄金换算助手 · gold-mate.pages.dev</div>
</body>
</html>
